name: Deploy IEAMS to Production (FTP)

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./IEAMS

    steps:
      # 1. Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup PHP 8.3
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, pdo_mysql, tokenizer, xml, ctype, json, curl, gd, zip
          coverage: none

      # 3. Cache Composer dependencies
      - name: Cache Composer Packages
        uses: actions/cache@v4
        with:
          path: IEAMS/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('IEAMS/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # 4. Install PHP dependencies (no dev, optimized)
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # 5. Setup Node.js for frontend build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: IEAMS/package-lock.json

      # 6. Install Node.js packages
      - name: Install NPM Dependencies
        run: npm ci --ignore-scripts

      # 7. Build frontend assets (Vite)
      - name: Build Frontend Assets
        run: npm run build

      # 8. Set storage directory permissions (create writable dirs)
      - name: Prepare Storage Directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          chmod -R 775 storage bootstrap/cache

      # 9. Deploy via FTP
      # server-dir is hardcoded to root './', and .env is excluded from upload
      - name: Deploy to Production Server via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 1021
          protocol: ftp
          local-dir: ./IEAMS/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.example
            **/.editorconfig
            **/.phpunit*
            **/phpunit.xml
            **/README.md
            **/*.log
            **/Thumbs.db
            **/.DS_Store
            **/bootstrap/cache/config.php
            **/bootstrap/cache/routes-v7.php

      # 10. Trigger post-deploy hooks (Migration, Optimize & Clear cache) via secure curl request
      - name: Trigger Post-Deploy Migration & Cache Clear
        run: |
          echo "Triggering post-deploy hooks on the server..."
          curl -f -s "https://ieams.mysoftheaven.com/api/deploy-hook?token=${{ secrets.FTP_PASS }}"


